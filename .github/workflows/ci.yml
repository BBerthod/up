name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php }} — Tests & Lint
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.4"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, pdo_pgsql, pgsql, redis, bcmath, intl, mbstring, dom, curl, zip, pcntl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --no-scripts

      - name: Run Composer scripts (package:discover)
        run: composer run post-autoload-dump

      - name: Prepare .env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Pint (lint)
        run: ./vendor/bin/pint --test

      - name: Run tests
        run: ./vendor/bin/phpunit --testdox
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

      - name: Security audit (PHP)
        run: composer audit
        continue-on-error: false

  frontend:
    name: Node — Build & Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP (needed for composer-installed Ziggy imported by Vite)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, curl, zip
          coverage: none

      - name: Install Composer dependencies (no dev, no scripts)
        run: composer install --prefer-dist --no-progress --no-interaction --no-dev --no-scripts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_REVERB_APP_KEY: ci-placeholder
          VITE_REVERB_HOST: localhost
          VITE_REVERB_PORT: "443"
          VITE_REVERB_SCHEME: https

      - name: Security audit (npm)
        run: npm audit --production
        continue-on-error: true
