services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: up-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - up-storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - up-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: up-worker
    restart: unless-stopped
    command: php artisan queue:work redis --queue=monitors,notifications,default --sleep=3 --tries=3 --max-time=3600 --max-jobs=500
    env_file:
      - .env
    volumes:
      - up-storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - up-network
    stop_signal: SIGTERM
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  lighthouse-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: up-lighthouse-worker
    restart: unless-stopped
    command: php artisan queue:work redis_long --queue=lighthouse --sleep=2 --tries=2 --max-time=3600 --max-jobs=50
    env_file:
      - .env
    volumes:
      - up-storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - up-network
    stop_signal: SIGTERM
    stop_grace_period: 120s
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  warming-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: up-warming-worker
    restart: unless-stopped
    command: php artisan queue:work redis_long --queue=warming --sleep=2 --tries=2 --max-time=3600 --max-jobs=50
    env_file:
      - .env
    volumes:
      - up-storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - up-network
    stop_signal: SIGTERM
    stop_grace_period: 120s
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: up-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    env_file:
      - .env
    volumes:
      - up-storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - up-network
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'schedule:work' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: up-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - up-storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
    networks:
      - up-network
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'reverb:start' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: up-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-up}
      POSTGRES_USER: ${DB_USERNAME:-up}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - up-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-up} -d ${DB_DATABASE:-up}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: up-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy volatile-lru
    volumes:
      - redisdata:/data
    networks:
      - up-network
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pg-backup:
    image: alpine:3.19
    container_name: up-pg-backup
    restart: unless-stopped
    entrypoint: >
      sh -c "
        apk add --no-cache postgresql16-client dcron &&
        mkdir -p /backups &&
        echo '0 3 * * * pg_dump -h postgres -U $${DB_USERNAME} -d $${DB_DATABASE} -F c -f /backups/up-$$(date +\\%Y\\%m\\%d).dump && find /backups -name \"*.dump\" -mtime +$${BACKUP_RETENTION_DAYS:-7} -delete' > /etc/crontabs/root &&
        crond -f -l 6
      "
    environment:
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      DB_USERNAME: ${DB_USERNAME:-up}
      DB_DATABASE: ${DB_DATABASE:-up}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - up-network
    deploy:
      resources:
        limits:
          memory: 64M

networks:
  up-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  up-storage:
  backups:
