<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're offline — Up</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #09090b;
            color: #ececef;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(12px);
        }

        .logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            margin-bottom: 1.5rem;
        }

        .logo-wrap img {
            width: 32px;
            height: 32px;
        }

        h1 {
            font-size: 1.375rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.01em;
            margin-bottom: 0.75rem;
        }

        p {
            font-size: 0.9375rem;
            color: #a1a1aa;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8125rem;
            color: #71717a;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 999px;
            padding: 0.375rem 0.875rem;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse 2s ease-in-out infinite;
        }

        .dot.online {
            background: #10b981;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding: 0.625rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #fff;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            text-decoration: none;
        }

        .retry-btn:hover {
            background: rgba(16, 185, 129, 0.25);
            border-color: rgba(16, 185, 129, 0.5);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-wrap">
            <img src="/icons/icon.svg" alt="Up" width="32" height="32">
        </div>
        <h1>You're offline</h1>
        <p>Your dashboard data may be outdated. We'll reconnect automatically when your connection is restored.</p>
        <div class="status">
            <span class="dot" id="status-dot"></span>
            <span id="status-text">Waiting for connection...</span>
        </div>
        <a href="/dashboard" class="retry-btn" id="retry-btn" onclick="return checkAndRetry(event)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.1"/>
            </svg>
            Try again
        </a>
    </div>

    <script>
        const dot = document.getElementById('status-dot')
        const text = document.getElementById('status-text')

        function checkAndRetry(e) {
            if (navigator.onLine) {
                return true // allow navigation
            }
            e.preventDefault()
            text.textContent = 'Still offline...'
            return false
        }

        function updateStatus(online) {
            if (online) {
                dot.classList.add('online')
                text.textContent = 'Back online — reloading...'
                setTimeout(() => { window.location.href = '/dashboard' }, 800)
            } else {
                dot.classList.remove('online')
                text.textContent = 'Waiting for connection...'
            }
        }

        window.addEventListener('online', () => updateStatus(true))
        window.addEventListener('offline', () => updateStatus(false))

        // Polling fallback — check every 5 seconds
        setInterval(() => {
            if (navigator.onLine) {
                fetch('/manifest.json', { method: 'HEAD', cache: 'no-store' })
                    .then(() => updateStatus(true))
                    .catch(() => {})
            }
        }, 5000)
    </script>
</body>
</html>
